services:
  web:
    image: node:22-alpine
    container_name: merchtable-web
    working_dir: /app
    command: ["sh", "-c", "echo 'web service stub (replace in later phase)' && tail -f /dev/null"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/merchtable?schema=public
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://garage:3900
      STORAGE_BUCKET: media
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-access-key-id}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-secret-access-key}
      STORAGE_USE_PATH_STYLE: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy

  worker:
    image: node:22-alpine
    container_name: merchtable-worker
    working_dir: /app
    command: ["sh", "-c", "echo 'worker service stub (replace in later phase)' && tail -f /dev/null"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/merchtable?schema=public
      REDIS_URL: redis://redis:6379
      TRANSCODE_CONCURRENCY: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: merchtable-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: merchtable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchtable"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: merchtable-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: merchtable-garage
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-media}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-access-key-id}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-secret-access-key}
    ports:
      - "3900:3900"
      - "3902:3902"
    volumes:
      - ./infra/garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  garage_data:
