services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      network: host
    image: merchtable-web:local
    container_name: merchtable-web
    network_mode: host
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/merchtable?schema=public}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://localhost:6379}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-auth-secret-change-me}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      STORE_ORG_SLUG: ${STORE_ORG_SLUG:-main-store}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      STORAGE_MODE: ${STORAGE_MODE:-GARAGE}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ENDPOINT: ${DOCKER_STORAGE_ENDPOINT:-http://localhost:3900}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-media}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-access-key-id}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-secret-access-key}
      STORAGE_USE_PATH_STYLE: ${STORAGE_USE_PATH_STYLE:-true}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:3900/media}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-USD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health/live').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
      network: host
    image: merchtable-worker:local
    container_name: merchtable-worker
    network_mode: host
    restart: unless-stopped

    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/merchtable?schema=public}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://localhost:6379}
      STORAGE_MODE: ${STORAGE_MODE:-GARAGE}
      STORAGE_ENDPOINT: ${DOCKER_STORAGE_ENDPOINT:-http://localhost:3900}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-media}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-access-key-id}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-secret-access-key}
      STORAGE_USE_PATH_STYLE: ${STORAGE_USE_PATH_STYLE:-true}
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY:-1}
      TRANSCODE_SOURCE_ROOT: ${TRANSCODE_SOURCE_ROOT:-/tmp/merch-table/source}
      TRANSCODE_OUTPUT_ROOT: ${TRANSCODE_OUTPUT_ROOT:-/tmp/merch-table/output}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: merchtable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: merchtable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchtable"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: merchtable-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: merchtable-garage
    restart: unless-stopped
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-media}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-access-key-id}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-secret-access-key}
    ports:
      - "3900:3900"
      - "3902:3902"
    volumes:
      - ./infra/garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  garage_data:
